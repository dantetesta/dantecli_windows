name: Build DANTE CLI (Windows)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # needed for releases

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]   # add ARM64 once stable
        configuration: [Release]

    env:
      Solution_Name: DanteCLI.sln
      Project_Path: DanteCLI/DanteCLI.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: msbuild $env:Project_Path /t:Restore /p:RuntimeIdentifier=win-${{ matrix.platform }} /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: Publish self-contained (msbuild)
        run: |
          msbuild $env:Project_Path `
            /t:Publish `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:RuntimeIdentifier=win-${{ matrix.platform }} `
            /p:SelfContained=true `
            /p:WindowsAppSDKSelfContained=true `
            /p:WindowsPackageType=None `
            /p:PublishSingleFile=false `
            /p:PublishDir=publish\${{ matrix.platform }}\

      - name: Verify output and list size
        shell: pwsh
        run: |
          $dir = "DanteCLI/publish/${{ matrix.platform }}"
          if (-not (Test-Path $dir)) { $dir = "publish/${{ matrix.platform }}" }
          "PUBLISH_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append
          Get-ChildItem -Recurse $dir | Measure-Object -Sum Length |
            ForEach-Object { "Total: {0:N1} MB" -f ($_.Sum / 1MB) }
          Get-ChildItem $dir | Select-Object -First 8

      - name: Zip build output
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:PUBLISH_DIR/*" `
                           -DestinationPath "DanteCLI-${{ matrix.platform }}.zip" `
                           -Force

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanteCLI-${{ matrix.platform }}
          path: DanteCLI-${{ matrix.platform }}.zip
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DanteCLI-${{ matrix.platform }}.zip
          generate_release_notes: true
