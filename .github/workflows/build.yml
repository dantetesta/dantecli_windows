name: Build DANTE CLI (Windows)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate .ico from PNG
        shell: pwsh
        run: |
          $src = "DanteCLI/Assets/icone-app.png"
          $dst = "DanteCLI/Assets/app.ico"
          if (Test-Path $src) {
              magick "$src" -define icon:auto-resize=256,128,64,48,32,16 "$dst"
          }

      - name: Restore
        run: dotnet restore DanteCLI/DanteCLI.csproj -r ${{ matrix.rid }}

      - name: Publish single-file self-contained
        run: |
          dotnet publish DanteCLI/DanteCLI.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=embedded `
            -o publish/${{ matrix.rid }}

      - name: Verify output
        shell: pwsh
        run: |
          Get-ChildItem publish/${{ matrix.rid }} | Where-Object { -not $_.PSIsContainer } |
            Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length / 1MB, 1)}} |
            Format-Table -AutoSize

      - name: Rename exe for clarity
        shell: pwsh
        run: |
          Copy-Item "publish/${{ matrix.rid }}/DanteCLI.exe" "DanteCLI-${{ matrix.rid }}.exe" -Force
          Get-Item "DanteCLI-${{ matrix.rid }}.exe" |
            Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length / 1MB, 1)}}

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanteCLI-${{ matrix.rid }}
          path: DanteCLI-${{ matrix.rid }}.exe
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DanteCLI-${{ matrix.rid }}.exe
          generate_release_notes: true
