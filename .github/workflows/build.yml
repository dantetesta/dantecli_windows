name: Build DANTE CLI (Windows)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # needed for releases

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]   # add ARM64 once stable
        configuration: [Release]

    env:
      Solution_Name: DanteCLI.sln
      Project_Path: DanteCLI/DanteCLI.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore $env:Solution_Name

      - name: Build
        run: |
          msbuild $env:Solution_Name `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:WindowsPackageType=None `
            /p:GenerateAppxPackageOnBuild=false `
            /p:AppxPackageSigningEnabled=false `
            /restore

      - name: Locate build output
        id: locate
        shell: pwsh
        run: |
          $out = "DanteCLI/bin/${{ matrix.platform }}/${{ matrix.configuration }}/net8.0-windows10.0.19041.0/win-${{ matrix.platform }}"
          if (-not (Test-Path $out)) {
              $out = "DanteCLI/bin/${{ matrix.platform }}/${{ matrix.configuration }}/net8.0-windows10.0.19041.0"
          }
          Write-Host "Output dir: $out"
          Get-ChildItem $out | Select-Object -First 5
          "out=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Zip build output
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.locate.outputs.out }}/*" `
                           -DestinationPath "DanteCLI-${{ matrix.platform }}.zip" `
                           -Force

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanteCLI-${{ matrix.platform }}
          path: DanteCLI-${{ matrix.platform }}.zip
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DanteCLI-${{ matrix.platform }}.zip
          generate_release_notes: true
