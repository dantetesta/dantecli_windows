name: Build DANTE CLI (Windows)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # needed for releases

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64]   # add ARM64 once stable
        configuration: [Release]

    env:
      Solution_Name: DanteCLI.sln
      Project_Path: DanteCLI/DanteCLI.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore $env:Solution_Name

      - name: Build
        run: |
          msbuild $env:Solution_Name `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:WindowsPackageType=None `
            /p:GenerateAppxPackageOnBuild=false `
            /p:AppxPackageSigningEnabled=false `
            /restore

      - name: Publish self-contained EXE
        run: |
          dotnet publish $env:Project_Path `
            -c ${{ matrix.configuration }} `
            -r win-${{ matrix.platform }} `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:WindowsPackageType=None `
            -o publish/${{ matrix.platform }}

      - name: Zip publish output
        shell: pwsh
        run: |
          Compress-Archive -Path publish/${{ matrix.platform }}/* `
                           -DestinationPath "DanteCLI-${{ matrix.platform }}.zip" `
                           -Force

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanteCLI-${{ matrix.platform }}
          path: DanteCLI-${{ matrix.platform }}.zip
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DanteCLI-${{ matrix.platform }}.zip
          generate_release_notes: true
